<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product — Artisan & Co.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">Artisan <span>&</span> Co.</a>
      <button class="hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links" id="nav-links">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="shop.html" class="nav-link">Shop</a></li>
        <li><a href="about.html" class="nav-link">About</a></li>
        <li>
          <a href="cart.html" class="nav-link nav-cart">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
            Cart
            <span class="cart-badge" id="cart-badge">0</span>
          </a>
        </li>
      </ul>
    </div>
  </nav>

  <div style="padding: 16px 0; background: var(--color-cream); border-bottom: 1px solid var(--color-border);">
    <div class="container">
      <nav style="font-size:0.8rem; color:var(--color-text-muted); display:flex; gap:6px; align-items:center;">
        <a href="index.html" style="color:var(--color-text-muted)">Home</a>
        <span>›</span>
        <a href="shop.html" style="color:var(--color-text-muted)">Shop</a>
        <span>›</span>
        <span id="breadcrumb-name" style="color:var(--color-bark)">Product</span>
      </nav>
    </div>
  </div>

  <section class="section">
    <div class="container">
      <div class="product-detail" id="product-detail">
        <div style="text-align:center; color:var(--color-text-muted); padding: 80px 0; grid-column:1/-1;">Loading product…</div>
      </div>
    </div>
  </section>

  <section class="section" style="background:var(--color-white); padding-top:0;">
    <div class="container">
      <div class="section-header" style="text-align:left; margin-bottom:32px;">
        <h2>You May Also Like</h2>
      </div>
      <div class="product-grid" id="related-grid"></div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>© 2026 Artisan & Co. All rights reserved.</p>
        <div class="social-links">
          <a href="#" aria-label="Instagram">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
          </a>
        </div>
      </div>
    </div>
  </footer>

  <div class="toast" id="toast">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    <span id="toast-msg"></span>
  </div>

  <script src="products.js"></script>
  <script src="cart.js"></script>
  <script src="nav.js"></script>
  <script>
    let qty = 1;

    function showToast(msg) {
      const t = document.getElementById("toast");
      document.getElementById("toast-msg").textContent = msg;
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 3000);
    }

    function changeQty(delta) {
      qty = Math.max(1, qty + delta);
      document.getElementById("qty-display").value = qty;
    }

    const params = new URLSearchParams(window.location.search);
    const id = parseInt(params.get("id"));
    const product = products.find(p => p.id === id);

    if (!product) {
      document.getElementById("product-detail").innerHTML =
        `<div style="grid-column:1/-1;text-align:center;padding:80px 0;">
          <h2>Product not found</h2>
          <a href="shop.html" class="btn btn-primary" style="margin-top:24px;display:inline-flex">Back to Shop</a>
        </div>`;
    } else {
      document.title = `${product.name} — Artisan & Co.`;
      document.getElementById("breadcrumb-name").textContent = product.name;

      document.getElementById("product-detail").innerHTML = `
        <div class="product-detail-image">
          <img src="https://picsum.photos/seed/artisan${product.id}/600/600" alt="${product.name}" />
        </div>
        <div class="detail-meta">
          <span class="detail-category">${product.category}</span>
          <h1 class="detail-name">${product.name}</h1>
          <p class="detail-artisan">By <strong>${product.artisan}</strong></p>
          <div class="detail-price">₹${product.price}</div>
          <p class="detail-desc">${product.description}</p>
          <div class="detail-specs">
            <div class="detail-spec">
              <span class="label">Material</span>
              <span class="value">${product.material}</span>
            </div>
            <div class="detail-spec">
              <span class="label">Dimensions</span>
              <span class="value">${product.dimensions}</span>
            </div>
            <div class="detail-spec">
              <span class="label">Artisan</span>
              <span class="value">${product.artisan}</span>
            </div>
          </div>
          <div class="add-to-cart-row">
            <div class="qty-controls">
              <button class="qty-btn" onclick="changeQty(-1)">−</button>
              <input class="qty-display" id="qty-display" type="number" value="1" min="1" readonly />
              <button class="qty-btn" onclick="changeQty(1)">+</button>
            </div>
            <button class="btn btn-primary btn-lg" onclick="addToCart(${product.id}, qty); showToast('${product.name} added to cart!')">
              Add to Cart
            </button>
          </div>
          <a href="shop.html" style="font-size:0.85rem; color:var(--color-text-muted); display:inline-flex; align-items:center; gap:6px; margin-top:8px;">
            ← Continue Shopping
          </a>
        </div>`;

      const related = products
        .filter(p => p.category === product.category && p.id !== product.id)
        .slice(0, 3);

      if (related.length === 0) {
        products.filter(p => p.id !== product.id).slice(0, 3).forEach(p => related.push(p));
      }

      document.getElementById("related-grid").innerHTML = related.map(p => `
        <div class="product-card">
          <a href="product.html?id=${p.id}">
            <div class="product-image">
              <img src="https://picsum.photos/seed/artisan${p.id}/400/300" alt="${p.name}" loading="lazy" />
            </div>
          </a>
          <div class="product-info">
            <span class="product-category">${p.category}</span>
            <a href="product.html?id=${p.id}"><div class="product-name">${p.name}</div></a>
            <div class="product-artisan">by ${p.artisan}</div>
            <div class="product-footer">
              <span class="product-price">₹${p.price}</span>
              <button class="btn btn-primary btn-sm" onclick="addToCart(${p.id},1);showToast('Added to cart!')">Add to Cart</button>
            </div>
          </div>
        </div>`).join("");
    }
  </script>
</body>
</html>

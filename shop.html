<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop — Artisan & Co.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">Artisan <span>&</span> Co.</a>
      <button class="hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links" id="nav-links">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="shop.html" class="nav-link">Shop</a></li>
        <li><a href="about.html" class="nav-link">About</a></li>
        <li>
          <a href="cart.html" class="nav-link nav-cart">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
            Cart
            <span class="cart-badge" id="cart-badge">0</span>
          </a>
        </li>
      </ul>
    </div>
  </nav>

  <div class="page-header">
    <div class="container">
      <h1>The Collection</h1>
      <p>Thoughtfully crafted goods by independent artisans.</p>
    </div>
  </div>

  <section class="section-sm">
    <div class="container">
      <div class="shop-meta">
        <div class="filter-bar" id="filter-bar">
          <button class="filter-btn active" data-category="all">All</button>
          <button class="filter-btn" data-category="ceramics">🏺 Ceramics</button>
          <button class="filter-btn" data-category="textiles">🧵 Textiles</button>
          <button class="filter-btn" data-category="woodwork">🪵 Woodwork</button>
          <button class="filter-btn" data-category="jewelry">💍 Jewelry</button>
        </div>
        <span class="product-count" id="product-count">12 products</span>
      </div>
      <div class="product-grid" id="product-grid"></div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>© 2026 Artisan & Co. All rights reserved.</p>
        <div class="social-links">
          <a href="#" aria-label="Instagram">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
          </a>
          <a href="#" aria-label="Pinterest">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.236 2.636 7.855 6.356 9.312-.088-.791-.167-2.005.035-2.868.181-.78 1.172-4.97 1.172-4.97s-.299-.598-.299-1.482c0-1.388.806-2.428 1.808-2.428.853 0 1.267.641 1.267 1.408 0 .858-.546 2.140-.828 3.33-.236.995.499 1.806 1.476 1.806 1.772 0 3.135-1.867 3.135-4.561 0-2.385-1.715-4.053-4.163-4.053-2.836 0-4.498 2.126-4.498 4.325 0 .857.33 1.774.74 2.276a.297.297 0 0 1 .069.284c-.075.314-.243.995-.276 1.134-.044.183-.147.222-.338.134-1.249-.581-2.030-2.407-2.030-3.874 0-3.154 2.292-6.052 6.608-6.052 3.469 0 6.165 2.473 6.165 5.776 0 3.447-2.173 6.220-5.19 6.220-1.013 0-1.966-.527-2.292-1.148l-.623 2.378c-.226.869-.835 1.958-1.244 2.621.937.29 1.931.446 2.962.446C17.523 22 22 17.523 22 12S17.523 2 12 2z"/></svg>
          </a>
        </div>
      </div>
    </div>
  </footer>

  <div class="toast" id="toast">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    <span id="toast-msg"></span>
  </div>

  <script src="products.js"></script>
  <script src="cart.js"></script>
  <script src="nav.js"></script>
  <script>
    let activeCategory = "all";

    const params = new URLSearchParams(window.location.search);
    if (params.get("category")) activeCategory = params.get("category");

    function showToast(msg) {
      const t = document.getElementById("toast");
      document.getElementById("toast-msg").textContent = msg;
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 3000);
    }

    function renderCard(p) {
      return `
        <div class="product-card" data-category="${p.category}">
          <a href="product.html?id=${p.id}">
            <div class="product-image">
              <img src="https://picsum.photos/seed/artisan${p.id}/400/300" alt="${p.name}" loading="lazy" />
            </div>
          </a>
          <div class="product-info">
            <span class="product-category">${p.category}</span>
            <a href="product.html?id=${p.id}"><div class="product-name">${p.name}</div></a>
            <div class="product-artisan">by ${p.artisan}</div>
            <div class="product-footer">
              <span class="product-price">₹${p.price}</span>
              <button class="btn btn-primary btn-sm" onclick="addToCart(${p.id},1);showToast('Added to cart!')">Add to Cart</button>
            </div>
          </div>
        </div>`;
    }

    function applyFilter(category) {
      activeCategory = category;

      document.querySelectorAll(".filter-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.category === category);
      });

      const filtered = category === "all"
        ? products
        : products.filter(p => p.category === category);

      document.getElementById("product-grid").innerHTML = filtered.map(renderCard).join("");
      document.getElementById("product-count").textContent = `${filtered.length} product${filtered.length !== 1 ? "s" : ""}`;
    }

    document.getElementById("filter-bar").addEventListener("click", e => {
      const btn = e.target.closest(".filter-btn");
      if (btn) applyFilter(btn.dataset.category);
    });

    applyFilter(activeCategory);
  </script>
</body>
</html>
